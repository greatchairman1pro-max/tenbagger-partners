<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 경영 대시보드 · 텐베거 파트너스</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f0f4f8; color: #1a1a1a; min-height: 100vh; }

    /* 네비게이션 */
    .nav { background: #0C447C; color: #fff; padding: 0.8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
    .nav-logo { font-size: 15px; font-weight: 700; }
    .nav-sub { font-size: 10px; opacity: 0.7; margin-top: 2px; }
    .nav-tabs { display: flex; gap: 6px; }
    .tab-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .tab-btn.active { background: #FAC775; color: #1a1a1a; }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.25); }

    /* 페이지 전환 */
    .page { display: none; padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }

    /* 카드 공통 */
    .card { background: #fff; border-radius: 14px; padding: 1.4rem; border: 1px solid #e4edf7; margin-bottom: 1rem; }
    .card-title { font-size: 14px; font-weight: 700; color: #0C447C; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 2px solid #E6F1FB; display: flex; align-items: center; gap: 6px; }

    /* ── 입력 페이지 ── */
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .input-section.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: #777; font-weight: 600; }
    .form-group input, .form-group select { padding: 9px 10px; border: 1px solid #dde5ef; border-radius: 8px; font-size: 13px; background: #fafbfd; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #185FA5; background: #fff; }
    .month-selector { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .month-selector select { padding: 8px 12px; border: 1px solid #dde5ef; border-radius: 8px; font-size: 13px; background: #fff; }
    .btn-save { background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-save:hover { background: #0C447C; }
    .btn-dash { background: #27ae60; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .biz-info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .save-msg { font-size: 13px; color: #27ae60; font-weight: 600; display: none; }

    /* ── 대시보드 ── */
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1rem; }
    .summary-card { background: #fff; border-radius: 12px; padding: 1.1rem 1.2rem; border: 1px solid #e4edf7; }
    .summary-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .summary-value { font-size: 22px; font-weight: 800; color: #111; }
    .summary-value.blue { color: #185FA5; }
    .summary-value.green { color: #27ae60; }
    .summary-value.red { color: #e74c3c; }
    .summary-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* 신호등 */
    .signal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .signal-item { border-radius: 10px; padding: 0.9rem 1rem; font-size: 13px; }
    .signal-red { background: #FFF5F5; border: 1px solid #feb2b2; }
    .signal-yellow { background: #FFFFF0; border: 1px solid #f6e05e; }
    .signal-green { background: #F0FFF4; border: 1px solid #9ae6b4; }
    .signal-icon { font-size: 16px; margin-bottom: 4px; }
    .signal-title { font-weight: 700; font-size: 12px; margin-bottom: 2px; }
    .signal-desc { font-size: 11px; color: #666; line-height: 1.5; }

    /* 월별 카드 그리드 */
    .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .month-card { border-radius: 12px; padding: 1rem; border: 1px solid #e4edf7; background: #fff; }
    .month-card.profit-ok { background: #EBF8FF; border-color: #90cdf4; }
    .month-card.profit-bad { background: #FFF5F5; border-color: #feb2b2; }
    .month-card.empty { background: #fafbfd; border-color: #eaf0f8; opacity: 0.6; }
    .month-name { font-size: 13px; font-weight: 700; color: #0C447C; margin-bottom: 8px; }
    .month-row { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 3px; }
    .month-row span:last-child { font-weight: 600; color: #111; }
    .month-profit { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; margin-top: 8px; padding-top: 6px; border-top: 1px solid #e0e8f0; }
    .month-empty-msg { font-size: 12px; color: #bbb; text-align: center; padding: 1rem 0; }

    /* 차트 */
    .chart-wrap { position: relative; height: 220px; }

    /* 반응형 */
    @media (max-width: 768px) {
      .input-grid, .biz-info-grid, .summary-grid { grid-template-columns: 1fr 1fr; }
      .input-section.col3 { grid-template-columns: 1fr 1fr; }
      .month-grid { grid-template-columns: repeat(2, 1fr); }
      .signal-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .summary-grid, .input-grid, .biz-info-grid { grid-template-columns: 1fr; }
      .month-grid { grid-template-columns: 1fr; }
      .nav-tabs .tab-btn { font-size: 11px; padding: 6px 10px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div>
    <div class="nav-logo">텐베거 파트너스</div>
    <div class="nav-sub">AI 경영 대시보드</div>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('input')">📝 데이터 입력</button>
    <button class="tab-btn" onclick="showPage('dashboard')">📊 경영 대시보드</button>
  </div>
</nav>

<!-- ───────── 입력 페이지 ───────── -->
<div class="page active" id="page-input">

  <div class="card">
    <div class="card-title">🏢 사업자 정보</div>
    <div class="biz-info-grid">
      <div class="form-group"><label>업체명</label><input id="biz-name" placeholder="예) 홍길동 치킨"></div>
      <div class="form-group"><label>대표자명</label><input id="biz-owner" placeholder="홍길동"></div>
      <div class="form-group"><label>업종</label>
        <select id="biz-industry">
          <option>음식점·카페</option><option>소매·유통</option><option>서비스업</option>
          <option>제조·생산</option><option>미용·뷰티</option><option>기타</option>
        </select>
      </div>
      <div class="form-group"><label>담당 슈퍼바이져</label><input id="biz-sv" placeholder="담당자명"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 월 선택</div>
    <div class="month-selector">
      <select id="sel-year">
        <option>2025</option><option selected>2026</option><option>2027</option>
      </select>
      <select id="sel-month">
        <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
        <option value="4">4월</option><option value="5" selected>5월</option><option value="6">6월</option>
        <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
        <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
      </select>
      <button class="btn-save" onclick="loadMonth()" style="background:#6c757d">불러오기</button>
    </div>
  </div>

  <div class="input-grid">
    <!-- 매출 -->
    <div class="card">
      <div class="card-title">💰 매출</div>
      <div class="input-section">
        <div class="form-group"><label>카드 매출</label><input id="rev-card" type="number" placeholder="0"></div>
        <div class="form-group"><label>현금 매출</label><input id="rev-cash" type="number" placeholder="0"></div>
        <div class="form-group"><label>배달앱 매출</label><input id="rev-delivery" type="number" placeholder="0"></div>
        <div class="form-group"><label>기타 매출</label><input id="rev-other" type="number" placeholder="0"></div>
      </div>
    </div>

    <!-- 매입·재료비 -->
    <div class="card">
      <div class="card-title">🛒 매입 · 재료비</div>
      <div class="input-section">
        <div class="form-group"><label>식재료비</label><input id="cost-material" type="number" placeholder="0"></div>
        <div class="form-group"><label>소모품비</label><input id="cost-supplies" type="number" placeholder="0"></div>
        <div class="form-group"><label>포장재비</label><input id="cost-package" type="number" placeholder="0"></div>
        <div class="form-group"><label>기타 매입</label><input id="cost-other" type="number" placeholder="0"></div>
      </div>
    </div>

    <!-- 인건비 -->
    <div class="card">
      <div class="card-title">👥 인건비</div>
      <div class="input-section">
        <div class="form-group"><label>정규직 급여</label><input id="labor-full" type="number" placeholder="0"></div>
        <div class="form-group"><label>파트타임 급여</label><input id="labor-part" type="number" placeholder="0"></div>
        <div class="form-group"><label>4대보험 (사업주)</label><input id="labor-insure" type="number" placeholder="0"></div>
        <div class="form-group"><label>퇴직충당금</label><input id="labor-retire" type="number" placeholder="0"></div>
      </div>
    </div>

    <!-- 고정비 -->
    <div class="card">
      <div class="card-title">🏠 고정비</div>
      <div class="input-section col3">
        <div class="form-group"><label>임대료</label><input id="fix-rent" type="number" placeholder="0"></div>
        <div class="form-group"><label>관리비</label><input id="fix-manage" type="number" placeholder="0"></div>
        <div class="form-group"><label>통신비</label><input id="fix-telecom" type="number" placeholder="0"></div>
        <div class="form-group"><label>세무기장료</label><input id="fix-tax" type="number" placeholder="0"></div>
        <div class="form-group"><label>보험료</label><input id="fix-insure" type="number" placeholder="0"></div>
        <div class="form-group"><label>렌탈료</label><input id="fix-rental" type="number" placeholder="0"></div>
        <div class="form-group"><label>이자비용</label><input id="fix-interest" type="number" placeholder="0"></div>
        <div class="form-group"><label>POS·결제수수료</label><input id="fix-pos" type="number" placeholder="0"></div>
        <div class="form-group"><label>기타 고정비</label><input id="fix-other" type="number" placeholder="0"></div>
      </div>
    </div>

    <!-- 변동비 -->
    <div class="card">
      <div class="card-title">📢 변동비</div>
      <div class="input-section">
        <div class="form-group"><label>광고·마케팅비</label><input id="var-ad" type="number" placeholder="0"></div>
        <div class="form-group"><label>배달앱 수수료</label><input id="var-delivery-fee" type="number" placeholder="0"></div>
        <div class="form-group"><label>수선·유지비</label><input id="var-repair" type="number" placeholder="0"></div>
        <div class="form-group"><label>기타 변동비</label><input id="var-other" type="number" placeholder="0"></div>
      </div>
    </div>

    <!-- 목표 -->
    <div class="card">
      <div class="card-title">🎯 이번 달 목표</div>
      <div class="input-section">
        <div class="form-group"><label>매출 목표</label><input id="goal-rev" type="number" placeholder="0"></div>
        <div class="form-group"><label>순수익 목표</label><input id="goal-profit" type="number" placeholder="0"></div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:10px;align-items:center;margin-top:0.5rem">
    <button class="btn-save" onclick="saveMonth()">💾 저장하기</button>
    <button class="btn-dash" onclick="saveMonth();showPage('dashboard')">📊 대시보드 보기</button>
    <span class="save-msg" id="save-msg">✅ 저장됐습니다!</span>
  </div>
</div>

<!-- ───────── 대시보드 페이지 ───────── -->
<div class="page" id="page-dashboard">

  <!-- 사업체 헤더 -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div>
      <div style="font-size:20px;font-weight:800;color:#0C447C" id="dash-biz-name">업체명</div>
      <div style="font-size:12px;color:#888;margin-top:2px">대표: <span id="dash-biz-owner">-</span> | 담당 SV: <span id="dash-biz-sv">-</span></div>
    </div>
    <div style="font-size:12px;color:#aaa">최종 업데이트: <span id="dash-updated">-</span></div>
  </div>

  <!-- 요약 카드 -->
  <div class="summary-grid" id="summary-grid">
    <div class="summary-card"><div class="summary-label">올해 누적 매출</div><div class="summary-value blue" id="sum-rev">-</div></div>
    <div class="summary-card"><div class="summary-label">올해 누적 순수익</div><div class="summary-value green" id="sum-profit">-</div></div>
    <div class="summary-card"><div class="summary-label">평균 순수익률</div><div class="summary-value" id="sum-margin">-</div></div>
    <div class="summary-card"><div class="summary-label">입력된 월 수</div><div class="summary-value" id="sum-months">-</div></div>
  </div>

  <!-- 경영 신호등 -->
  <div class="card">
    <div class="card-title">🚦 경영 신호등</div>
    <div class="signal-grid" id="signal-grid">
      <div class="signal-item signal-green"><div class="signal-icon">🟢</div><div class="signal-title">데이터를 입력하면</div><div class="signal-desc">AI가 경영 신호를 분석합니다</div></div>
    </div>
  </div>

  <!-- 연간 차트 -->
  <div class="card">
    <div class="card-title">📈 12개월 매출 · 순수익 추이</div>
    <div class="chart-wrap"><canvas id="annual-chart"></canvas></div>
  </div>

  <!-- 비용 구조 차트 -->
  <div class="input-grid">
    <div class="card">
      <div class="card-title">🥧 비용 구조 (최근 월)</div>
      <div class="chart-wrap"><canvas id="cost-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">📊 매출 구성 (최근 월)</div>
      <div class="chart-wrap"><canvas id="rev-chart"></canvas></div>
    </div>
  </div>

  <!-- 12개월 카드 -->
  <div class="card">
    <div class="card-title">📅 월별 경영 현황</div>
    <div class="month-grid" id="month-grid"></div>
  </div>
</div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbzRXMl-8yYhyZkYoR9TpO2YkJOXoM7jFYQh7buWADfwyo2g00NFIk8y9gIIjFVzggupgw/exec';
var MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
var annualChart, costChart, revChart;

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
  if (id === 'dashboard') renderDashboard();
}

function n(id) { return parseFloat(document.getElementById(id).value) || 0; }
function fmt(v) { return (v/10000).toFixed(0) + '만원'; }
function fmtM(v) { return Math.round(v/10000) + '만'; }

function getKey() {
  return document.getElementById('sel-year').value + '-' + document.getElementById('sel-month').value;
}

function getData() {
  return {
    bizName: document.getElementById('biz-name').value,
    bizOwner: document.getElementById('biz-owner').value,
    bizIndustry: document.getElementById('biz-industry').value,
    bizSv: document.getElementById('biz-sv').value,
    revCard: n('rev-card'), revCash: n('rev-cash'), revDelivery: n('rev-delivery'), revOther: n('rev-other'),
    costMaterial: n('cost-material'), costSupplies: n('cost-supplies'), costPackage: n('cost-package'), costOther: n('cost-other'),
    laborFull: n('labor-full'), laborPart: n('labor-part'), laborInsure: n('labor-insure'), laborRetire: n('labor-retire'),
    fixRent: n('fix-rent'), fixManage: n('fix-manage'), fixTelecom: n('fix-telecom'), fixTax: n('fix-tax'),
    fixInsure: n('fix-insure'), fixRental: n('fix-rental'), fixInterest: n('fix-interest'), fixPos: n('fix-pos'), fixOther: n('fix-other'),
    varAd: n('var-ad'), varDeliveryFee: n('var-delivery-fee'), varRepair: n('var-repair'), varOther: n('var-other'),
    goalRev: n('goal-rev'), goalProfit: n('goal-profit')
  };
}

function calcProfit(d) {
  var revenue = d.revCard + d.revCash + d.revDelivery + d.revOther;
  var cogs = d.costMaterial + d.costSupplies + d.costPackage + d.costOther;
  var labor = d.laborFull + d.laborPart + d.laborInsure + d.laborRetire;
  var fixed = d.fixRent + d.fixManage + d.fixTelecom + d.fixTax + d.fixInsure + d.fixRental + d.fixInterest + d.fixPos + d.fixOther;
  var variable = d.varAd + d.varDeliveryFee + d.varRepair + d.varOther;
  var totalCost = cogs + labor + fixed + variable;
  var profit = revenue - totalCost;
  return { revenue: revenue, cogs: cogs, labor: labor, fixed: fixed, variable: variable, totalCost: totalCost, profit: profit };
}

function saveMonth() {
  var key = getKey();
  var d = getData();
  localStorage.setItem('dash-' + key, JSON.stringify(d));
  localStorage.setItem('dash-biz', JSON.stringify({ name: d.bizName, owner: d.bizOwner, industry: d.bizIndustry, sv: d.bizSv }));
  var msg = document.getElementById('save-msg');
  msg.style.display = 'inline';
  setTimeout(function(){ msg.style.display = 'none'; }, 2000);

  // 구글 시트에도 저장
  var c = calcProfit(d);
  var year = document.getElementById('sel-year').value;
  var month = document.getElementById('sel-month').value;
  fetch(SHEET_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ sheetName: 'ten-input', year: year, month: month,
      totalRevenue: c.revenue, totalCost: c.totalCost, netProfit: c.profit }, d))
  });
}

function loadMonth() {
  var key = getKey();
  var raw = localStorage.getItem('dash-' + key);
  if (!raw) { alert('저장된 데이터가 없습니다.'); return; }
  var d = JSON.parse(raw);
  var fields = ['rev-card','rev-cash','rev-delivery','rev-other',
    'cost-material','cost-supplies','cost-package','cost-other',
    'labor-full','labor-part','labor-insure','labor-retire',
    'fix-rent','fix-manage','fix-telecom','fix-tax','fix-insure','fix-rental','fix-interest','fix-pos','fix-other',
    'var-ad','var-delivery-fee','var-repair','var-other','goal-rev','goal-profit'];
  var keys = ['revCard','revCash','revDelivery','revOther',
    'costMaterial','costSupplies','costPackage','costOther',
    'laborFull','laborPart','laborInsure','laborRetire',
    'fixRent','fixManage','fixTelecom','fixTax','fixInsure','fixRental','fixInterest','fixPos','fixOther',
    'varAd','varDeliveryFee','varRepair','varOther','goalRev','goalProfit'];
  fields.forEach(function(f, i){ document.getElementById(f).value = d[keys[i]] || ''; });
  document.getElementById('biz-name').value = d.bizName || '';
  document.getElementById('biz-owner').value = d.bizOwner || '';
  document.getElementById('biz-sv').value = d.bizSv || '';
}

function renderDashboard() {
  var year = document.getElementById('sel-year').value;
  var biz = JSON.parse(localStorage.getItem('dash-biz') || '{}');
  document.getElementById('dash-biz-name').textContent = biz.name || '업체명 미입력';
  document.getElementById('dash-biz-owner').textContent = biz.owner || '-';
  document.getElementById('dash-biz-sv').textContent = biz.sv || '-';
  document.getElementById('dash-updated').textContent = new Date().toLocaleDateString('ko-KR');

  var monthData = [];
  var totalRev = 0, totalProfit = 0, filledMonths = 0;
  for (var m = 1; m <= 12; m++) {
    var raw = localStorage.getItem('dash-' + year + '-' + m);
    if (raw) {
      var d = JSON.parse(raw);
      var c = calcProfit(d);
      monthData.push({ month: m, data: d, calc: c });
      totalRev += c.revenue;
      totalProfit += c.profit;
      filledMonths++;
    } else {
      monthData.push(null);
    }
  }

  // 요약
  document.getElementById('sum-rev').textContent = fmt(totalRev);
  document.getElementById('sum-profit').textContent = fmt(totalProfit);
  document.getElementById('sum-margin').textContent = totalRev > 0 ? (totalProfit/totalRev*100).toFixed(1) + '%' : '-';
  document.getElementById('sum-months').textContent = filledMonths + '개월';

  // 신호등
  renderSignals(monthData, totalRev, totalProfit, filledMonths);

  // 연간 차트
  renderAnnualChart(monthData);

  // 최근 월 비용/매출 차트
  var recent = null;
  for (var i = 11; i >= 0; i--) { if (monthData[i]) { recent = monthData[i]; break; } }
  if (recent) {
    renderCostChart(recent.calc);
    renderRevChart(recent.data);
  }

  // 월별 카드
  renderMonthCards(monthData);
}

function renderSignals(monthData, totalRev, totalProfit, filledMonths) {
  var signals = [];
  if (filledMonths === 0) {
    signals.push({ type: 'green', icon: '🟢', title: '데이터를 입력해 주세요', desc: '입력 탭에서 매출·비용 데이터를 입력하면 분석이 시작됩니다.' });
  } else {
    var margin = totalRev > 0 ? totalProfit / totalRev : 0;
    if (margin < 0.05) signals.push({ type: 'red', icon: '🔴', title: '순수익률 위험', desc: '순수익률이 5% 미만입니다. 비용 구조 점검이 필요합니다.' });
    else if (margin < 0.15) signals.push({ type: 'yellow', icon: '🟡', title: '순수익률 주의', desc: '순수익률 ' + (margin*100).toFixed(1) + '%. 업종 평균(15%) 대비 낮습니다.' });
    else signals.push({ type: 'green', icon: '🟢', title: '순수익률 양호', desc: '순수익률 ' + (margin*100).toFixed(1) + '%. 안정적인 수익 구조입니다.' });

    var lastFilled = null;
    for (var i = 11; i >= 0; i--) { if (monthData[i]) { lastFilled = monthData[i]; break; } }
    if (lastFilled) {
      var c = lastFilled.calc;
      var adRatio = c.revenue > 0 ? lastFilled.data.varAd / c.revenue : 0;
      var rentRatio = c.revenue > 0 ? lastFilled.data.fixRent / c.revenue : 0;
      if (adRatio > 0.1) signals.push({ type: 'red', icon: '🔴', title: '광고비 과다', desc: '광고비가 매출의 ' + (adRatio*100).toFixed(0) + '%입니다. 10% 이하 조정을 권장합니다.' });
      if (rentRatio > 0.2) signals.push({ type: 'yellow', icon: '🟡', title: '임대료 비중 높음', desc: '임대료가 매출의 ' + (rentRatio*100).toFixed(0) + '%입니다. 주변 시세 재협상을 검토하세요.' });
      if (lastFilled.data.goalProfit > 0 && c.profit >= lastFilled.data.goalProfit)
        signals.push({ type: 'green', icon: '🟢', title: '목표 순수익 달성', desc: '이번 달 목표 순수익을 달성했습니다!' });
    }
    if (signals.length === 0) signals.push({ type: 'green', icon: '🟢', title: '현금 흐름 안정', desc: '전반적인 경영 상태가 양호합니다.' });
  }

  document.getElementById('signal-grid').innerHTML = signals.map(function(s){
    return '<div class="signal-item signal-'+s.type+'"><div class="signal-icon">'+s.icon+'</div><div class="signal-title">'+s.title+'</div><div class="signal-desc">'+s.desc+'</div></div>';
  }).join('');
}

function renderAnnualChart(monthData) {
  var revData = monthData.map(function(d){ return d ? Math.round(d.calc.revenue/10000) : null; });
  var profitData = monthData.map(function(d){ return d ? Math.round(d.calc.profit/10000) : null; });
  if (annualChart) annualChart.destroy();
  annualChart = new Chart(document.getElementById('annual-chart'), {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: [
        { label: '매출(만원)', data: revData, backgroundColor: 'rgba(24,95,165,0.6)', borderRadius: 4 },
        { label: '순수익(만원)', data: profitData, type: 'line', borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', tension: 0.4, fill: true, pointRadius: 4 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
  });
}

function renderCostChart(c) {
  if (costChart) costChart.destroy();
  costChart = new Chart(document.getElementById('cost-chart'), {
    type: 'doughnut',
    data: {
      labels: ['재료·매입', '인건비', '고정비', '변동비'],
      datasets: [{ data: [c.cogs, c.labor, c.fixed, c.variable].map(function(v){ return Math.round(v/10000); }),
        backgroundColor: ['#185FA5','#27ae60','#e67e22','#8e44ad'], borderWidth: 2 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 8 } } } }
  });
}

function renderRevChart(d) {
  if (revChart) revChart.destroy();
  revChart = new Chart(document.getElementById('rev-chart'), {
    type: 'doughnut',
    data: {
      labels: ['카드', '현금', '배달앱', '기타'],
      datasets: [{ data: [d.revCard, d.revCash, d.revDelivery, d.revOther].map(function(v){ return Math.round(v/10000); }),
        backgroundColor: ['#3498db','#2ecc71','#e74c3c','#f39c12'], borderWidth: 2 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 8 } } } }
  });
}

function renderMonthCards(monthData) {
  var html = monthData.map(function(item, i) {
    if (!item) return '<div class="month-card empty"><div class="month-name">' + MONTHS[i] + '</div><div class="month-empty-msg">데이터 없음</div></div>';
    var c = item.calc;
    var ok = item.data.goalProfit > 0 ? c.profit >= item.data.goalProfit : c.profit > 0;
    var cls = ok ? 'profit-ok' : (c.profit < 0 ? 'profit-bad' : '');
    return '<div class="month-card ' + cls + '">' +
      '<div class="month-name">' + MONTHS[i] + ' 분석</div>' +
      '<div class="month-row"><span>총 매출</span><span>' + fmtM(c.revenue) + '만</span></div>' +
      '<div class="month-row"><span>재료·매입</span><span>' + fmtM(c.cogs) + '만</span></div>' +
      '<div class="month-row"><span>인건비</span><span>' + fmtM(c.labor) + '만</span></div>' +
      '<div class="month-row"><span>고정비</span><span>' + fmtM(c.fixed) + '만</span></div>' +
      '<div class="month-row"><span>변동비</span><span>' + fmtM(c.variable) + '만</span></div>' +
      '<div class="month-profit"><span>예상 순수익</span><span style="color:' + (c.profit >= 0 ? '#185FA5' : '#e74c3c') + '">' + fmtM(c.profit) + '만</span></div>' +
      '</div>';
  }).join('');
  document.getElementById('month-grid').innerHTML = html;
}

// 초기화
window.onload = function() {
  var biz = JSON.parse(localStorage.getItem('dash-biz') || '{}');
  if (biz.name) document.getElementById('biz-name').value = biz.name;
  if (biz.owner) document.getElementById('biz-owner').value = biz.owner;
  if (biz.sv) document.getElementById('biz-sv').value = biz.sv;
};
</script>
</body>
