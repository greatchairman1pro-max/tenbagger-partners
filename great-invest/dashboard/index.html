<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO — 투자 분석 대시보드</title>
<style>
:root {
  --bg:     #0a0a0f;
  --bg2:    #13131a;
  --bg3:    #1c1c26;
  --border: #2a2a3a;
  --text:   #e8e8f0;
  --muted:  #6060a0;
  --up:     #ff4d4d;
  --down:   #4d9eff;
  --gold:   #ffd700;
  --r:      10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;
  display:grid;
  grid-template-rows:56px 1fr;
  grid-template-columns:200px 1fr;
  height:100vh; overflow:hidden;
}

/* Header */
header {
  grid-column:1/-1;
  background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:12px;
}
.logo { font-size:20px; font-weight:700; color:var(--gold); letter-spacing:3px; }
.logo-sub { color:var(--muted); font-size:12px; }
.hd-date { margin-left:auto; color:var(--muted); font-size:12px; }

/* Sidebar */
aside {
  background:var(--bg2); border-right:1px solid var(--border);
  overflow-y:auto; padding:16px 0;
}
.side-title { padding:0 16px 10px; font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.date-item {
  padding:9px 16px; cursor:pointer; font-size:13px;
  border-left:3px solid transparent; transition:all .15s; color:var(--muted);
}
.date-item:hover { background:var(--bg3); color:var(--text); }
.date-item.active { border-left-color:var(--gold); color:var(--gold); background:var(--bg3); font-weight:600; }

/* Main */
main { overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }

/* Agent bar */
.agent-bar {
  display:flex; gap:8px;
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:8px;
}
.agent-btn {
  flex:1; padding:10px 8px; border:1px solid var(--border);
  background:var(--bg3); color:var(--muted); cursor:pointer;
  border-radius:8px; font-size:13px; font-weight:500; transition:all .2s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.agent-btn .ab-icon { font-size:20px; }
.agent-btn .ab-name { font-size:11px; }
.agent-btn:hover { color:var(--text); border-color:var(--muted); }
.agent-btn.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:700; }
.agent-btn.active .ab-name { font-weight:700; }

/* Tabs */
.tabs {
  display:flex; gap:4px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--r); padding:5px;
}
.tab-btn {
  padding:7px 18px; border:none; background:transparent; color:var(--muted);
  cursor:pointer; border-radius:6px; font-size:13px; font-weight:500; transition:all .15s;
}
.tab-btn:hover { color:var(--text); background:var(--bg3); }
.tab-btn.active { background:var(--gold); color:#000; font-weight:700; }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:18px; }
.card-title {
  font-size:11px; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:14px;
  display:flex; justify-content:space-between; align-items:center;
}

/* Analysis */
.theme-name { font-size:26px; font-weight:700; color:var(--gold); margin-bottom:12px; }
.reasons { list-style:none; display:flex; flex-direction:column; gap:7px; }
.reasons li { padding:9px 13px; background:var(--bg3); border-radius:8px; border-left:3px solid var(--gold); font-size:13px; }
.tables-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.stock-table { width:100%; border-collapse:collapse; font-size:13px; }
.stock-table th { text-align:left; padding:7px 10px; color:var(--muted); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.stock-table td { padding:9px 10px; border-bottom:1px solid var(--border); }
.stock-table tr:last-child td { border-bottom:none; }
.stock-table tr:hover td { background:var(--bg3); }
.up   { color:var(--up);   font-weight:600; }
.down { color:var(--down); font-weight:600; }
.badge { font-size:10px; padding:2px 7px; border-radius:4px; background:var(--bg3); color:var(--muted); }

/* Market summary bar */
.market-bar {
  background:var(--bg3); border-radius:8px; padding:10px 14px;
  font-size:13px; color:var(--text); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}

/* Sector grid */
.sector-block { margin-bottom:18px; }
.sector-block:last-child { margin-bottom:0; }
.sector-label {
  font-size:11px; font-weight:600; color:var(--gold);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border);
}

/* Shorts */
.shorts-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
.shorts-label { font-size:10px; color:var(--muted); text-align:center; line-height:1.6; }
canvas#shortsCanvas { border-radius:10px; border:2px solid var(--border); box-shadow:0 0 24px rgba(255,215,0,.1); }
.dl-btn { padding:9px 24px; background:var(--gold); color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:13px; }
.dl-btn:hover { opacity:.85; }

/* Script */
.script-box {
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:18px; font-size:14px; line-height:1.9; white-space:pre-wrap;
}
.copy-btn {
  padding:5px 12px; background:var(--bg2); border:1px solid var(--border);
  color:var(--text); border-radius:5px; cursor:pointer; font-size:11px; transition:all .15s;
}
.copy-btn:hover { background:var(--gold); color:#000; }

/* Blog */
.blog-section { display:flex; flex-direction:column; gap:18px; }
.blog-part    { border-left:3px solid var(--border); padding-left:14px; }
.blog-part.intro      { border-color:var(--gold); }
.blog-part.body       { border-color:var(--down); }
.blog-part.conclusion { border-color:var(--up); }
.blog-part h3 { font-size:10px; color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:.5px; }
.blog-part p  { font-size:14px; line-height:1.85; white-space:pre-line; }

/* Tab content */
.tab-content        { display:none; }
.tab-content.active { display:flex; flex-direction:column; gap:14px; }
</style>
</head>
<body>

<header>
  <div class="logo">XO</div>
  <div class="logo-sub">투자 분석 대시보드</div>
  <div class="hd-date" id="headerDate"></div>
</header>

<aside>
  <div class="side-title">날짜 선택</div>
  <div id="dateList"></div>
</aside>

<main>
  <!-- 에이전트 선택 -->
  <div class="agent-bar">
    <button class="agent-btn active" onclick="switchAgent('market',this)">
      <span class="ab-icon">🇺🇸🇰🇷</span>
      <span class="ab-name">미장국장</span>
    </button>
    <button class="agent-btn" onclick="switchAgent('technical',this)">
      <span class="ab-icon">📈</span>
      <span class="ab-name">기술적분석</span>
    </button>
    <button class="agent-btn" onclick="switchAgent('sector',this)">
      <span class="ab-icon">🗂</span>
      <span class="ab-name">섹터테마</span>
    </button>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('analysis',this)">📊 분석</button>
    <button class="tab-btn"        onclick="switchTab('image',this)">🖼 이미지</button>
    <button class="tab-btn"        onclick="switchTab('script',this)">🎬 쇼츠 대본</button>
    <button class="tab-btn"        onclick="switchTab('blog',this)">📝 블로그</button>
  </div>

  <!-- 분석 탭 -->
  <div id="tab-analysis" class="tab-content active">
    <div id="analysisContent"></div>
  </div>

  <!-- 이미지 탭 -->
  <div id="tab-image" class="tab-content">
    <div class="card">
      <div class="card-title">
        📱 유튜브 쇼츠 이미지 (1080 × 1920)
        <span class="badge">우측·하단: YouTube UI 안전영역 반영</span>
      </div>
      <div class="shorts-wrap">
        <canvas id="shortsCanvas" width="338" height="600"></canvas>
        <div class="shorts-label">
          미리보기 31.25% | 우측 160px · 하단 400px YouTube 버튼 영역 제외<br>
          다운로드 시 원본 1080×1920 저장
        </div>
        <button class="dl-btn" onclick="downloadImage()">⬇ PNG 다운로드</button>
      </div>
    </div>
  </div>

  <!-- 쇼츠 대본 탭 -->
  <div id="tab-script" class="tab-content">
    <div class="card">
      <div class="card-title">🎬 쇼츠 대본 (60초) <button class="copy-btn" onclick="copyId('scriptBox',this)">복사</button></div>
      <div class="script-box" id="scriptBox"></div>
    </div>
  </div>

  <!-- 블로그 탭 -->
  <div id="tab-blog" class="tab-content">
    <div class="card">
      <div class="card-title">📝 블로그 원고 <button class="copy-btn" onclick="copyId('blogFull',this)">전체 복사</button></div>
      <div id="blogFull">
        <div class="blog-section">
          <div class="blog-part intro"><h3>서론</h3><p id="blogIntro"></p></div>
          <div class="blog-part body"><h3>본론</h3><p id="blogBody"></p></div>
          <div class="blog-part conclusion"><h3>결론</h3><p id="blogConclusion"></p></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────
let currentAgent = 'market';
let currentTab   = 'analysis';
let currentDate  = null;
let agentData    = {};  // { market: data, technical: data, sector: data }

// ── Agent switch ─────────────────────────────────────────────
function switchAgent(name, btn) {
  currentAgent = name;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentDate) loadAgentData(name, currentDate);
}

// ── Tab switch ───────────────────────────────────────────────
function switchTab(name, btn) {
  currentTab = name;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  const d = agentData[currentAgent];
  if (d) {
    if (name === 'image')  drawShortsCanvas(document.getElementById('shortsCanvas'), currentAgent, d);
    if (name === 'script') renderScript(d);
    if (name === 'blog')   renderBlog(d);
  }
}

// ── Load ─────────────────────────────────────────────────────
async function loadDateIndex() {
  try {
    const res = await fetch('data/index.json');
    const idx = await res.json();
    renderSidebar(idx.dates);
    if (idx.dates.length) selectDate(idx.dates[0]);
  } catch {
    renderSidebar([SAMPLES.market.date]);
    selectDate(SAMPLES.market.date, true);
  }
}

function renderSidebar(dates) {
  document.getElementById('dateList').innerHTML = dates.map(d =>
    `<div class="date-item" onclick="selectDate('${d}')" data-date="${d}">${d}</div>`
  ).join('');
}

function selectDate(date, useSample) {
  currentDate = date;
  document.querySelectorAll('.date-item').forEach(el =>
    el.classList.toggle('active', el.dataset.date === date)
  );
  document.getElementById('headerDate').textContent = date + ' 리포트';
  loadAgentData(currentAgent, date, useSample);
}

async function loadAgentData(agent, date, useSample) {
  if (useSample) {
    agentData[agent] = SAMPLES[agent];
    applyData(agent, SAMPLES[agent]);
    return;
  }
  try {
    const res = await fetch(`data/${agent}/${date}.json`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    agentData[agent] = data;
    applyData(agent, data);
  } catch {
    agentData[agent] = SAMPLES[agent];
    applyData(agent, SAMPLES[agent]);
  }
}

function applyData(agent, data) {
  if (agent !== currentAgent) return;
  if (currentTab === 'analysis') renderAnalysis(agent, data);
  if (currentTab === 'image')    drawShortsCanvas(document.getElementById('shortsCanvas'), agent, data);
  if (currentTab === 'script')   renderScript(data);
  if (currentTab === 'blog')     renderBlog(data);
  // Always refresh analysis when data loads
  renderAnalysis(agent, data);
}

// ── Analysis render (3 agents) ───────────────────────────────
function renderAnalysis(agent, data) {
  const el = document.getElementById('analysisContent');
  if (agent === 'market')    el.innerHTML = renderMarket(data);
  if (agent === 'technical') el.innerHTML = renderTechnical(data);
  if (agent === 'sector')    el.innerHTML = renderSector(data);
}

function renderMarket(d) {
  return `
    <div class="card">
      <div class="card-title">오늘의 미장 테마</div>
      <div class="theme-name">${d.theme.name}</div>
      <ul class="reasons">${d.theme.reasons.map(r=>`<li>💡 ${r}</li>`).join('')}</ul>
    </div>
    <div class="tables-grid">
      <div class="card">
        <div class="card-title">🇺🇸 미국 상위 종목</div>
        <table class="stock-table">
          <thead><tr><th>종목</th><th>티커</th><th>가격($)</th><th>등락률</th></tr></thead>
          <tbody>${d.us_stocks.map(s=>`<tr>
            <td>${s.name}</td>
            <td style="color:var(--muted)">${s.ticker}</td>
            <td>$${s.price.toLocaleString()}</td>
            <td class="${s.change>=0?'up':'down'}">${s.change>=0?'+':''}${s.change}%</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">🇰🇷 국내 수혜주</div>
        <table class="stock-table">
          <thead><tr><th>종목</th><th>코드</th><th>가격(₩)</th><th>등락률</th></tr></thead>
          <tbody>${d.kr_stocks.map(s=>`<tr>
            <td>${s.name}</td>
            <td style="color:var(--muted)">${s.code}</td>
            <td>₩${s.price.toLocaleString()}</td>
            <td class="${s.change>=0?'up':'down'}">${s.change>=0?'+':''}${s.change}%</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function renderTechnical(d) {
  return `
    <div class="card">
      <div class="card-title">${d.title}</div>
      <div class="market-bar">📊 ${d.market_summary}</div>
      <table class="stock-table">
        <thead><tr><th>종목</th><th>코드</th><th>가격(₩)</th><th>1일차</th><th>2일차</th><th>누적</th><th>거래량비</th><th>시그널</th></tr></thead>
        <tbody>${d.stocks.map(s=>`<tr>
          <td>${s.name}</td>
          <td style="color:var(--muted)">${s.code}</td>
          <td>₩${s.price.toLocaleString()}</td>
          <td class="up">+${s.day1}%</td>
          <td class="up">+${s.day2}%</td>
          <td class="up" style="font-weight:700">+${s.total}%</td>
          <td style="color:var(--gold)">${s.volume_ratio}x</td>
          <td style="color:var(--muted);font-size:11px">${s.signal}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function renderSector(d) {
  const foreignBlocks = d.foreign.map(sec => `
    <div class="sector-block">
      <div class="sector-label">🌐 ${sec.sector}</div>
      <table class="stock-table">
        <thead><tr><th>종목</th><th>티커</th><th>가격($)</th><th>등락률</th></tr></thead>
        <tbody>${sec.stocks.map(s=>`<tr>
          <td>${s.name}</td>
          <td style="color:var(--muted)">${s.ticker}</td>
          <td>$${s.price.toLocaleString()}</td>
          <td class="${s.change>=0?'up':'down'}">${s.change>=0?'+':''}${s.change}%</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`).join('');

  const domesticBlocks = d.domestic.map(sec => `
    <div class="sector-block">
      <div class="sector-label">🇰🇷 ${sec.sector}</div>
      <table class="stock-table">
        <thead><tr><th>종목</th><th>코드</th><th>가격(₩)</th><th>등락률</th></tr></thead>
        <tbody>${sec.stocks.map(s=>`<tr>
          <td>${s.name}</td>
          <td style="color:var(--muted)">${s.code}</td>
          <td>₩${s.price.toLocaleString()}</td>
          <td class="${s.change>=0?'up':'down'}">${s.change>=0?'+':''}${s.change}%</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`).join('');

  return `
    <div class="card">
      <div class="card-title">🌐 해외 강세 섹터</div>
      ${foreignBlocks}
    </div>
    <div class="card">
      <div class="card-title">🇰🇷 국내 강세 섹터</div>
      ${domesticBlocks}
    </div>`;
}

// ── Script / Blog ────────────────────────────────────────────
function renderScript(d) { document.getElementById('scriptBox').textContent = d.shorts_script; }
function renderBlog(d) {
  document.getElementById('blogIntro').textContent      = d.blog.intro;
  document.getElementById('blogBody').textContent       = d.blog.body;
  document.getElementById('blogConclusion').textContent = d.blog.conclusion;
}

// ── Shorts Canvas ─────────────────────────────────────────────
// Canvas: 338×600 (preview 31.25% of 1080×1920)
// Safe zone: right 160px + bottom 400px excluded (YouTube UI)
// Content area: x 0~920, y 0~1520
function drawShortsCanvas(canvas, agent, d) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;   // 338, 600
  const s = W / 1080;                          // 0.3129...

  // Safe zone boundaries in canvas coords
  const safeRight  = Math.floor(920 * s);       // ≈ 288
  const safeBottom = Math.floor(1520 * s);      // ≈ 476
  const padL = Math.floor(36 * s);              // ≈ 11
  const contentW = safeRight - padL;            // usable width

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080810'); bg.addColorStop(1, '#0d0d20');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Subtle horizontal lines
  ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 0.5;
  for (let y = 0; y < H; y += Math.floor(36*s)) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // YouTube UI zone overlays (right + bottom) — subtle indicator
  ctx.fillStyle = 'rgba(255,100,100,0.04)';
  ctx.fillRect(safeRight, 0, W - safeRight, safeBottom);  // right strip
  ctx.fillRect(0, safeBottom, W, H - safeBottom);         // bottom strip

  // ── Header (y 0 ~ 130px full → 0 ~ 41canvas) ──
  const hdrH = Math.floor(130 * s);
  const hdrGrad = ctx.createLinearGradient(0, 0, 0, hdrH);
  hdrGrad.addColorStop(0, 'rgba(255,215,0,0.18)');
  hdrGrad.addColorStop(1, 'rgba(255,215,0,0.04)');
  ctx.fillStyle = hdrGrad; ctx.fillRect(0, 0, safeRight, hdrH);

  // Logo
  ctx.font = `bold ${Math.floor(30*s)}px "Segoe UI",sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.fillText('XO', padL, Math.floor(88*s));

  // Agent label chip
  const agentLabel = {market:'미장국장', technical:'기술적분석', sector:'섹터테마'}[agent];
  ctx.font = `${Math.floor(18*s)}px "Segoe UI",sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(agentLabel, padL + Math.floor(50*s), Math.floor(88*s));

  // Date (right side, within safe zone)
  ctx.font = `${Math.floor(17*s)}px "Segoe UI",sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  const dw = ctx.measureText(d.date).width;
  ctx.fillText(d.date, safeRight - dw - Math.floor(10*s), Math.floor(88*s));

  let y = Math.floor(160 * s);

  // ── Theme / Title section ──
  const title = agent === 'market' ? d.theme.name : d.title;
  ctx.font = `${Math.floor(14*s)}px "Segoe UI",sans-serif`;
  ctx.fillStyle = 'rgba(255,215,0,0.75)';
  ctx.fillText(agent === 'market' ? '오늘의 미장 테마' : '오늘의 분석 주제', padL, y);

  y += Math.floor(42*s);
  const titleSize = title.length > 14 ? Math.floor(28*s) : Math.floor(34*s);
  ctx.font = `bold ${titleSize}px "Segoe UI",sans-serif`;
  ctx.fillStyle = '#ffffff';
  // Word wrap if too long
  if (ctx.measureText(title).width > contentW) {
    const mid = Math.floor(title.length / 2);
    ctx.fillText(title.slice(0, mid), padL, y);
    y += Math.floor(38*s);
    ctx.fillText(title.slice(mid), padL, y);
  } else {
    ctx.fillText(title, padL, y);
  }
  y += Math.floor(22*s);

  // Gold divider
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = Math.floor(2*s);
  ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(safeRight - Math.floor(10*s), y); ctx.stroke();
  y += Math.floor(22*s);

  // ── Agent-specific content ──
  if (agent === 'market') {
    y = drawMarketCanvas(ctx, d, y, s, padL, safeRight, contentW);
  } else if (agent === 'technical') {
    y = drawTechnicalCanvas(ctx, d, y, s, padL, safeRight, contentW);
  } else {
    y = drawSectorCanvas(ctx, d, y, s, padL, safeRight, contentW);
  }

  // ── Branding footer (just above safe bottom) ──
  const footY = safeBottom - Math.floor(40*s);
  ctx.strokeStyle = 'rgba(255,215,0,0.25)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(padL, footY); ctx.lineTo(safeRight - Math.floor(10*s), footY); ctx.stroke();
  ctx.font = `${Math.floor(14*s)}px "Segoe UI",sans-serif`;

  ctx.font = `${Math.floor(12*s)}px "Segoe UI",sans-serif`;

  ctx.save();
  ctx.translate(W - Math.floor(8*s), Math.floor(H/2));
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center';
  ctx.fillText('YouTube 버튼 영역', 0, 0);
  ctx.restore();
  ctx.fillText('YouTube UI', Math.floor(10*s), H - Math.floor(8*s));
}

function drawMarketCanvas(ctx, d, y, s, padL, safeRight, contentW) {
  const rowH = Math.floor(40*s);
  const cols = [0, Math.floor(90*s), Math.floor(170*s), Math.floor(240*s)];

  // US section
  y = drawTableSection(ctx, '🇺🇸 미국 상위 종목', d.us_stocks.slice(0,5).map(s2=>({
    c0: s2.name.slice(0,7), c1: s2.ticker, c2: `$${s2.price}`, c3: `${s2.change>=0?'+':''}${s2.change}%`, up: s2.change>=0
  })), y, s, padL, safeRight, contentW, cols, rowH);

  y += Math.floor(24*s);

  // KR section
  y = drawTableSection(ctx, '🇰🇷 국내 수혜주', d.kr_stocks.slice(0,5).map(s2=>({
    c0: s2.name.slice(0,5), c1: s2.code, c2: `₩${(s2.price/1000).toFixed(0)}K`, c3: `${s2.change>=0?'+':''}${s2.change}%`, up: s2.change>=0
  })), y, s, padL, safeRight, contentW, cols, rowH);

  return y;
}

function drawTechnicalCanvas(ctx, d, y, s, padL, safeRight, contentW) {

  ctx.font = `${Math.floor(14*s)}px "Segoe UI",sans-serif`;

function drawSectorCanvas(ctx, d, y, s, padL, safeRight, contentW) {
  const rowH = Math.floor(34*s);
  const cols = [0, Math.floor(90*s), Math.floor(165*s), Math.floor(235*s)];

  // Top 2 foreign sectors
  for (const sec of d.foreign.slice(0,2)) {
    ctx.font = `bold ${Math.floor(13*s)}px "Segoe UI",sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`🌐 ${sec.sector}`, padL, y);
    y += Math.floor(22*s);
    for (const st of sec.stocks.slice(0,2)) {
      ctx.font = `${Math.floor(12*s)}px "Segoe UI",sans-serif`;
      ctx.fillStyle = '#fff';    ctx.fillText(st.name.slice(0,8), padL + cols[0], y);
      ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fillText(st.ticker, padL + cols[1], y);
      ctx.fillStyle = st.change>=0?'#ff4d4d':'#4d9eff';
      ctx.fillText(`${st.change>=0?'+':''}${st.change}%`, padL + cols[2], y);
      y += rowH;
    }
    y += Math.floor(8*s);
  }

  // Top 2 domestic sectors
  for (const sec of d.domestic.slice(0,2)) {
    ctx.font = `bold ${Math.floor(13*s)}px "Segoe UI",sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`🇰🇷 ${sec.sector}`, padL, y);
    y += Math.floor(22*s);
    for (const st of sec.stocks.slice(0,2)) {
      ctx.font = `${Math.floor(12*s)}px "Segoe UI",sans-serif`;
      ctx.fillStyle = '#fff';    ctx.fillText(st.name.slice(0,5), padL + cols[0], y);
      ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fillText(st.code, padL + cols[1], y);
      ctx.fillStyle = st.change>=0?'#ff4d4d':'#4d9eff';
      ctx.fillText(`${st.change>=0?'+':''}${st.change}%`, padL + cols[2], y);
      y += rowH;
    }
    y += Math.floor(8*s);
  }
  return y;
}

function drawTableSection(ctx, title, rows, y, s, padL, safeRight, contentW, cols, rowH) {
  // Section card background
  const cardH = Math.floor(30*s) + Math.floor(24*s) + rows.length * rowH + Math.floor(12*s);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  rrect(ctx, padL - Math.floor(8*s), y - Math.floor(16*s), safeRight - padL + Math.floor(8*s), cardH, Math.floor(8*s));

  // Title
  ctx.font = `bold ${Math.floor(14*s)}px "Segoe UI",sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.fillText(title, padL, y);
  y += Math.floor(20*s);

  // Column headers
  ctx.font = `${Math.floor(11*s)}px "Segoe UI",sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  const hdrs = ['종목','정보','가격','등락'];
  hdrs.forEach((h,i) => ctx.fillText(h, padL + cols[i], y));
  y += Math.floor(5*s);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(safeRight - Math.floor(10*s), y); ctx.stroke();

  // Rows
  rows.forEach(r => {
    y += rowH;
    ctx.font = `${Math.floor(12*s)}px "Segoe UI",sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText(r.c0, padL + cols[0], y);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText(r.c1, padL + cols[1], y);
    ctx.fillStyle = '#fff';
    ctx.fillText(r.c2, padL + cols[2], y);
    ctx.fillStyle = r.up ? '#ff4d4d' : '#4d9eff';
    ctx.fillText(r.c3, padL + cols[3], y);
  });

  return y + Math.floor(12*s);
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}

function downloadImage() {
  const d = agentData[currentAgent];
  if (!d) return;
  const off = document.createElement('canvas');
  off.width = 1080; off.height = 1920;
  drawShortsCanvas(off, currentAgent, d);
  const a = document.createElement('a');
  a.download = `XO_${currentAgent}_${d.date}.png`;
  a.href = off.toDataURL('image/png');
  a.click();
}

// ── Copy ─────────────────────────────────────────────────────
function copyId(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
    const o = btn.textContent; btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = o, 1500);
  });
}
