<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUBE — 미장 테마 분석 대시보드</title>
<style>
:root {
  --bg:     #0a0a0f;
  --bg2:    #13131a;
  --bg3:    #1c1c26;
  --border: #2a2a3a;
  --text:   #e8e8f0;
  --muted:  #6060a0;
  --up:     #ff4d4d;
  --down:   #4d9eff;
  --gold:   #ffd700;
  --r:      10px;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI','Apple SD Gothic Neo',sans-serif;
  display: grid;
  grid-template-rows: 56px 1fr;
  grid-template-columns: 220px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
header {
  grid-column: 1 / -1;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.logo       { font-size:20px; font-weight:700; color:var(--gold); letter-spacing:2px; }
.subtitle   { color:var(--muted); font-size:13px; }
.hd-date    { margin-left:auto; color:var(--muted); font-size:13px; }

/* ── Sidebar ── */
aside {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
}
.sidebar-title {
  padding: 0 16px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.date-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  border-left: 3px solid transparent;
  transition: all .15s;
  color: var(--muted);
}
.date-item:hover  { background:var(--bg3); color:var(--text); }
.date-item.active { border-left-color:var(--gold); color:var(--gold); background:var(--bg3); font-weight:600; }

/* ── Main ── */
main {
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px;
}
.tab-btn {
  padding: 8px 20px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  transition: all .15s;
}
.tab-btn:hover       { color:var(--text); background:var(--bg3); }
.tab-btn.active      { background:var(--gold); color:#000; font-weight:700; }

/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ── Analysis ── */
.theme-name { font-size:28px; font-weight:700; color:var(--gold); margin-bottom:14px; }
.reasons    { list-style:none; display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.reasons li {
  padding: 10px 14px;
  background: var(--bg3);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
  font-size: 14px;
}
.tables-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.stock-table { width:100%; border-collapse:collapse; font-size:14px; }
.stock-table th {
  text-align: left;
  padding: 8px 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}
.stock-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.stock-table tr:last-child td { border-bottom:none; }
.stock-table tr:hover td { background:var(--bg3); }
.up   { color:var(--up);   font-weight:600; }
.down { color:var(--down); font-weight:600; }

/* ── Shorts image ── */
.shorts-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
.shorts-label { font-size:11px; color:var(--muted); }
canvas#shortsCanvas {
  border-radius: 12px;
  border: 2px solid var(--border);
  box-shadow: 0 0 30px rgba(255,215,0,.1);
}
.dl-btn {
  padding: 10px 28px;
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
}
.dl-btn:hover { opacity:.85; }

/* ── Script ── */
.script-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  font-size: 15px;
  line-height: 1.9;
  white-space: pre-wrap;
  position: relative;
}
.copy-btn {
  padding: 6px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
.copy-btn:hover { background:var(--gold); color:#000; }

/* ── Blog ── */
.blog-section { display:flex; flex-direction:column; gap:20px; }
.blog-part    { border-left:3px solid var(--border); padding-left:16px; }
.blog-part.intro      { border-color:var(--gold); }
.blog-part.body       { border-color:var(--down); }
.blog-part.conclusion { border-color:var(--up);  }
.blog-part h3 { font-size:12px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
.blog-part p  { font-size:15px; line-height:1.85; white-space:pre-line; }

/* ── Tabs content ── */
.tab-content        { display:none; }
.tab-content.active { display:flex; flex-direction:column; gap:16px; }
</style>
</head>
<body>

<header>
  <div class="logo">📺 TUBE</div>
  <div class="subtitle">미장 테마 자동 분석 대시보드</div>
  <div class="hd-date" id="headerDate"></div>
</header>

<aside>
  <div class="sidebar-title">날짜 선택</div>
  <div id="dateList"></div>
</aside>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('analysis',this)">📊 분석</button>
    <button class="tab-btn"        onclick="switchTab('image',this)">🖼 이미지</button>
    <button class="tab-btn"        onclick="switchTab('script',this)">🎬 쇼츠 대본</button>
    <button class="tab-btn"        onclick="switchTab('blog',this)">📝 블로그</button>
  </div>

  <!-- 분석 -->
  <div id="tab-analysis" class="tab-content active">
    <div class="card">
      <div class="card-title">오늘의 미장 테마</div>
      <div class="theme-name" id="themeName">—</div>
      <ul class="reasons" id="reasonsList"></ul>
    </div>
    <div class="tables-grid">
      <div class="card">
        <div class="card-title">🇺🇸 미국 상위 종목</div>
        <table class="stock-table">
          <thead><tr><th>종목</th><th>티커</th><th>가격($)</th><th>등락률</th></tr></thead>
          <tbody id="usTable"></tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">🇰🇷 국내 수혜주</div>
        <table class="stock-table">
          <thead><tr><th>종목</th><th>코드</th><th>가격(₩)</th><th>등락률</th></tr></thead>
          <tbody id="krTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 이미지 -->
  <div id="tab-image" class="tab-content">
    <div class="card">
      <div class="card-title">📱 유튜브 쇼츠 이미지 (1080 × 1920)</div>
      <div class="shorts-wrap">
        <canvas id="shortsCanvas" width="405" height="720"></canvas>
        <div class="shorts-label">미리보기 37.5% — 다운로드 시 원본 해상도 저장</div>
        <button class="dl-btn" onclick="downloadImage()">⬇ PNG 다운로드 (1080×1920)</button>
      </div>
    </div>
  </div>

  <!-- 쇼츠 대본 -->
  <div id="tab-script" class="tab-content">
    <div class="card">
      <div class="card-title">
        🎬 쇼츠 대본 (60초)
        <button class="copy-btn" onclick="copyId('scriptBox',this)">복사</button>
      </div>
      <div class="script-box" id="scriptBox"></div>
    </div>
  </div>

  <!-- 블로그 -->
  <div id="tab-blog" class="tab-content">
    <div class="card">
      <div class="card-title">
        📝 블로그 원고
        <button class="copy-btn" onclick="copyId('blogFull',this)">전체 복사</button>
      </div>
      <div id="blogFull">
        <div class="blog-section">
          <div class="blog-part intro">
            <h3>서론</h3>
            <p id="blogIntro"></p>
          </div>
          <div class="blog-part body">
            <h3>본론</h3>
            <p id="blogBody"></p>
          </div>
          <div class="blog-part conclusion">
            <h3>결론</h3>
            <p id="blogConclusion"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────
let currentData = null;

// ── Tab ──────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'image' && currentData) drawShortsCanvas(document.getElementById('shortsCanvas'), currentData);
}

// ── Load ─────────────────────────────────────────────────────
async function loadDateIndex() {
  try {
    const res = await fetch('data/index.json');
    const idx = await res.json();
    renderSidebar(idx.dates);
    if (idx.dates.length) loadReport(idx.dates[0]);
  } catch {
    renderSidebar([SAMPLE.date]);
    applyData(SAMPLE);
  }
}

function renderSidebar(dates) {
  document.getElementById('dateList').innerHTML = dates.map(d =>
    `<div class="date-item" onclick="loadReport('${d}')" data-date="${d}">${d}</div>`
  ).join('');
}

async function loadReport(date) {
  document.querySelectorAll('.date-item').forEach(el =>
    el.classList.toggle('active', el.dataset.date === date)
  );
  try {
    const res = await fetch(`data/${date}.json`);
    applyData(await res.json());
  } catch {
    applyData(SAMPLE);
  }
}

// ── Render ───────────────────────────────────────────────────
function applyData(d) {
  currentData = d;
  document.getElementById('headerDate').textContent = d.date + ' 리포트';
  renderAnalysis(d);
  renderScript(d);
  renderBlog(d);
  const active = document.querySelector('.tab-content.active');
  if (active && active.id === 'tab-image') drawShortsCanvas(document.getElementById('shortsCanvas'), d);
}

function renderAnalysis(d) {
  document.getElementById('themeName').textContent = d.theme.name;
  document.getElementById('reasonsList').innerHTML =
    d.theme.reasons.map(r => `<li>💡 ${r}</li>`).join('');
  document.getElementById('usTable').innerHTML =
    d.us_stocks.map(s => `<tr>
      <td>${s.name}</td>
      <td style="color:var(--muted)">${s.ticker}</td>
      <td>$${s.price.toLocaleString()}</td>
      <td class="${s.change >= 0 ? 'up' : 'down'}">${s.change >= 0 ? '+' : ''}${s.change}%</td>
    </tr>`).join('');
  document.getElementById('krTable').innerHTML =
    d.kr_stocks.map(s => `<tr>
      <td>${s.name}</td>
      <td style="color:var(--muted)">${s.code}</td>
      <td>₩${s.price.toLocaleString()}</td>
      <td class="${s.change >= 0 ? 'up' : 'down'}">${s.change >= 0 ? '+' : ''}${s.change}%</td>
    </tr>`).join('');
}

function renderScript(d) { document.getElementById('scriptBox').textContent = d.shorts_script; }

function renderBlog(d) {
  document.getElementById('blogIntro').textContent      = d.blog.intro;
  document.getElementById('blogBody').textContent       = d.blog.body;
  document.getElementById('blogConclusion').textContent = d.blog.conclusion;
}

// ── Canvas drawing ───────────────────────────────────────────
function drawShortsCanvas(canvas, d) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const s = W / 1080;  // scale factor

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a1a');
  bg.addColorStop(1, '#0d0d1f');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40 * s) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Header area
  ctx.fillStyle = 'rgba(255,215,0,0.08)'; ctx.fillRect(0, 0, W, 80 * s);

  // Logo
  ctx.font = `bold ${26*s}px "Segoe UI",sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.fillText('📺 TUBE', 24*s, 52*s);

  // Date (right-aligned)
  ctx.font = `${13*s}px "Segoe UI",sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.45)';
  const dw = ctx.measureText(d.date).width;
  ctx.fillText(d.date, W - 24*s - dw, 52*s);

  // Theme label
  ctx.font = `${13*s}px "Segoe UI",sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.fillText('오늘의 미장 테마', 24*s, 112*s);

  // Theme name
  const tsize = d.theme.name.length > 12 ? 30*s : 38*s;
  ctx.font = `bold ${tsize}px "Segoe UI",sans-serif`; ctx.fillStyle = '#ffffff';
  ctx.fillText(d.theme.name, 24*s, 158*s);

  // Gold divider
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2*s;
  ctx.beginPath(); ctx.moveTo(24*s, 174*s); ctx.lineTo(W-24*s, 174*s); ctx.stroke();

  // Reasons
  ctx.font = `${13*s}px "Segoe UI",sans-serif`;
  d.theme.reasons.forEach((r, i) => {
    const y = (198 + i*30) * s;
    ctx.fillStyle = 'rgba(255,215,0,0.8)'; ctx.fillText(`${i+1}.`, 24*s, y);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(r.length > 28 ? r.slice(0,28)+'…' : r, 44*s, y);
  });

  // US Stocks card
  let y = 275 * s;
  rrect(ctx, 16*s, y-22*s, W-32*s, 200*s, 10*s, 'rgba(255,255,255,0.04)');
  ctx.font = `bold ${13*s}px "Segoe UI",sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.fillText('🇺🇸 미국 상위 종목', 28*s, y);
  y += 24*s;
  const cols = [28, 118, 218, 318];
  const hdrs = ['종목','티커','가격($)','등락률'];
  ctx.font = `${10*s}px "Segoe UI",sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  hdrs.forEach((h,i) => ctx.fillText(h, cols[i]*s, y));
  y += 6*s;
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(24*s,y); ctx.lineTo(W-24*s,y); ctx.stroke();
  d.us_stocks.slice(0,5).forEach(st => {
    y += 26*s;
    ctx.font = `${12*s}px "Segoe UI",sans-serif`;
    ctx.fillStyle='#fff';    ctx.fillText(st.name.slice(0,9),    cols[0]*s, y);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText(st.ticker, cols[1]*s, y);
    ctx.fillStyle='#fff';    ctx.fillText(`$${st.price}`,         cols[2]*s, y);
    ctx.fillStyle = st.change >= 0 ? '#ff4d4d' : '#4d9eff';
    ctx.fillText(`${st.change>=0?'+':''}${st.change}%`,           cols[3]*s, y);
  });

  // KR Stocks card
  y += 38*s;
  rrect(ctx, 16*s, y-22*s, W-32*s, 200*s, 10*s, 'rgba(255,255,255,0.04)');
  ctx.font = `bold ${13*s}px "Segoe UI",sans-serif`; ctx.fillStyle = '#ffd700';
  ctx.fillText('🇰🇷 국내 수혜주', 28*s, y);
  y += 24*s;
  ctx.font = `${10*s}px "Segoe UI",sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ['종목','코드','가격(₩)','등락률'].forEach((h,i) => ctx.fillText(h, cols[i]*s, y));
  y += 6*s;
  ctx.beginPath(); ctx.moveTo(24*s,y); ctx.lineTo(W-24*s,y); ctx.stroke();
  d.kr_stocks.slice(0,5).forEach(st => {
    y += 26*s;
    ctx.font = `${12*s}px "Segoe UI",sans-serif`;
    ctx.fillStyle='#fff';    ctx.fillText(st.name.slice(0,6),           cols[0]*s, y);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText(st.code,        cols[1]*s, y);
    ctx.fillStyle='#fff';    ctx.fillText(`₩${st.price.toLocaleString()}`, cols[2]*s, y);
    ctx.fillStyle = st.change >= 0 ? '#ff4d4d' : '#4d9eff';
    ctx.fillText(`${st.change>=0?'+':''}${st.change}%`,                 cols[3]*s, y);
  });

  // Footer
  const fy = H - 48*s;
  ctx.strokeStyle='rgba(255,215,0,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(24*s,fy); ctx.lineTo(W-24*s,fy); ctx.stroke();
  ctx.font = `${11*s}px "Segoe UI",sans-serif`;
  ctx.fillStyle='rgba(255,215,0,0.65)';
  ctx.fillText('📺 TUBE — 매일 아침 미장 테마 분석', 24*s, fy+24*s);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  const disc = '투자 판단의 책임은 본인에게 있습니다';
  ctx.fillText(disc, W-24*s-ctx.measureText(disc).width, fy+24*s);
}

function rrect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
}

// ── Download full-res ────────────────────────────────────────
function downloadImage() {
  if (!currentData) return;
  const off = document.createElement('canvas');
  off.width = 1080; off.height = 1920;
  drawShortsCanvas(off, currentData);
  const a = document.createElement('a');
  a.download = `TUBE_${currentData.date}.png`;
  a.href = off.toDataURL('image/png');
  a.click();
}

// ── Copy ─────────────────────────────────────────────────────
function copyId(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── Sample data ──────────────────────────────────────────────
const SAMPLE = {
  "date": "2026-05-13",
  "theme": {
    "name": "반도체 / AI 인프라",
    "reasons": [

    ]
  },
  "us_stocks": [
    {"name":"NVIDIA",    "ticker":"NVDA",  "price":950.00,  "change":8.5},
    {"name":"AMD",       "ticker":"AMD",   "price":175.00,  "change":5.2},
    {"name":"Broadcom",  "ticker":"AVGO",  "price":1680.00, "change":4.8},
    {"name":"Microsoft", "ticker":"MSFT",  "price":425.00,  "change":3.1},
    {"name":"Qualcomm",  "ticker":"QCOM",  "price":185.00,  "change":2.9}
  ],
  "kr_stocks": [
    {"name":"SK하이닉스", "code":"000660", "price":198000, "change":4.1},
    {"name":"한미반도체", "code":"042700", "price":165000, "change":5.8},
    {"name":"삼성전자",   "code":"005930", "price":87000,  "change":2.5},
    {"name":"리노공업",   "code":"058470", "price":242000, "change":3.2},
